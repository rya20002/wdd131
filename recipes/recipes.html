<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Recipebook</title>

    <meta name="description" content="Find simple, delicious recipes with search and sorting." />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link href="https://fonts.googleapis.com/css2?family=Amatic+SC:wght@700&display=swap" rel="stylesheet" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Recipebook" />
    <meta property="og:description" content="Find simple, delicious recipes with search and sorting." />
    <meta property="og:url" content="https://your-site-url-here.com/" />
    <meta property="og:image" content="https://your-site-url-here.com/images/social-preview-image.png" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Recipebook" />
    <meta name="twitter:description" content="Find simple, delicious recipes with search and sorting." />
    <meta name="twitter:image" content="https://your-site-url-here.com/images/social-preview-image.png" />

    <link rel="icon" href="favicon.ico" />
    <link rel="apple-touch-icon" href="images/apple-touch-icon.png" />

    <link rel="stylesheet" href="recipes.css" />
    <script src="recipes.js" defer></script>
  </head>

  <body>

    <header class="site-header">

    <div class="brand">
      <img class="brand-icon" src="images/recipe-book.png" alt="Recipe book icon" />
      <h1 class="brand-title">Recipebook</h1>
    </div>

    <form class="search" action="#" method="get" role="search">

    <label class="sr-only" for="q">Find a recipe</label>

    <input
      id="q"
      name="q"
      type="search"
      placeholder="Find a recipe"
    />

    <button class="search-btn" type="submit" aria-label="Search">
      <img src="images/search.svg" alt="" aria-hidden="true" />
    </button>

    </form>

  </header>

<main class="content"></main>

<footer class="site-footer">

<a
    class="attribution"
    href="https://www.flaticon.com/free-icons/recipe"
    title="recipe icons"
    >
    Recipe icons created by Freepik - Flaticon
</a>

<div class="social">
  <a href="#"><img src="images/instagram_icon.svg" alt="Instagram icon" /></a>
  <a href="#"><img src="images/youtube_icon.svg" alt="YouTube icon" /></a>
  <a href="#"><img src="images/pinterest_icon.svg" alt="Pinterest icon" /></a>
</div>

</footer>

</body>
</html>
