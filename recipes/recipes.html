<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Recipebook</title>
    <meta
      name="description"
      content="Find simple, delicious recipes—starting with a classic Apple Crisp."
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Amatic+SC:wght@700&display=swap"
      rel="stylesheet"
    />

    <!-- Open Graph (Facebook, LinkedIn, etc.) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Recipebook" />
    <meta property="og:description"
      content="Find simple, delicious recipes—starting with a classic Apple Crisp."/>
    <meta property="og:url" content="Your URL" />
    <meta property="og:image" content="images/social-preview-image.png" />

    <!-- X Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Recipebook" />
    <meta name="twitter:description"
      content="Find simple, delicious recipes—starting with a classic Apple Crisp."/>
    <meta name="twitter:image" content="images/social-preview-image.png" />
    <!-- One favicon (ICO works everywhere) -->
    <link rel="icon" href="/favicon.ico">

    <!-- One Apple Touch Icon (iOS home screen) -->
    <link rel="apple-touch-icon" href="images/apple-touch-icon.png">

    <link rel="stylesheet" href="recipes.css" />
  </head>

  <body>
    <header class="site-header">
      <div class="brand">
        <img
          class="brand-icon"
          src="images/recipe-book.png"
          alt="Recipe book icon"
        />
        <h1 class="brand-title">Recipebook</h1>
      </div>

      <form class="search" action="#" method="get" role="search">
        <label class="sr-only" for="q">Find a recipe</label>
        <input id="q" name="q" type="search" placeholder="Find a recipe" />
        <button class="search-btn" type="submit" aria-label="Search">
          <img src="images/search.svg" alt="" aria-hidden="true" />
        </button>
      </form>
    </header>

    <main class="content">
      <article class="recipe-card">
        <div class="recipe-image">
          <img src="images/apple-crisp.jpg" alt="Apple crisp with ice cream" />
        </div>

        <div class="recipe-info">
          <span class="tag">dessert</span>
          <h2 class="recipe-title">Apple Crisp</h2>
          <span class="rating" role="img" aria-label="Rating: 4 out of 5 stars">
            <span aria-hidden="true" class="icon-star">⭐</span>
            <span aria-hidden="true" class="icon-star">⭐</span>
            <span aria-hidden="true" class="icon-star">⭐</span>
            <span aria-hidden="true" class="icon-star">⭐</span>
            <span aria-hidden="true" class="icon-star-empty">☆</span>
          </span>

          <p class="recipe-desc">
            This apple crisp recipe is a simple yet delicious fall dessert that's
            great served warm with vanilla ice cream.
          </p>
        </div>
      </article>
    </main>

    <footer class="site-footer">
      <a class="attribution"
        href="https://www.flaticon.com/free-icons/recipe"
        title="recipe icons"
        >Recipe icons created by Freepik - Flaticon</a>

      <div class="social">
        <!-- Social media icons provided under CC from https://www.iconfinder.com/AlfredoCreates  -->
        <a href="#"><img src="images/instagram_icon.svg" alt="instagram icon"></a>
        <a href="#"><img src="images/youtube_icon.svg" alt="youtube icon"></a>
        <a href="#"><img src="images/pinterest_icon.svg" alt="pinterest icon"></a>
      </div> 
    </footer>
  </body>
</html>
